name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Ensure profile directory exists
        run: mkdir -p profile

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&theme=tokyonight&hide_border=false&include_all_commits=true&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=tokyonight&hide_border=false&include_all_commits=true&count_private=true&layout=compact
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate legacy stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=nightowl
          path: profile/stats-legacy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate legacy top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&size_weight=0.5&count_weight=0.5&langs_count=8&theme=nightowl
          path: profile/top-langs-legacy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Generate trophies card
        env:
          GITHUB_TOKEN1: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth=1 https://github.com/ryo-ma/github-profile-trophy.git .tmp-github-profile-trophy
          cd .tmp-github-profile-trophy
          deno run --allow-net --allow-env --allow-read --allow-write ./render_svg.ts "${{ github.repository_owner }}" "../profile/trophies.svg" tokyonight

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
